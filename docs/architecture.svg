<svg viewBox="0 0 760 840" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="840" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3763b6"/>
    </marker>
  </defs>

  <!-- ===== main vertical flow (center x = 380) ===== -->

  <!-- User -->
  <rect x="310" y="20" width="140" height="46" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="49" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a1a">User</text>

  <line x1="380" y1="66" x2="380" y2="98" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Laptop Webcam -->
  <rect x="300" y="100" width="160" height="46" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="129" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Laptop Webcam</text>

  <line x1="380" y1="146" x2="380" y2="182" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Laptop dashed group -->
  <rect x="175" y="182" width="410" height="248" rx="10" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="600" y="300" text-anchor="start" font-size="15" font-weight="bold" fill="#555">Laptop</text>

  <!-- Pose Estimation -->
  <rect x="220" y="196" width="320" height="58" rx="6" fill="#eef2fb" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="220" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Pose Estimation</text>
  <text x="380" y="240" text-anchor="middle" font-size="11.5" fill="#3763b6">MediaPipe BlazePose (33 landmarks)</text>

  <line x1="380" y1="254" x2="380" y2="278" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="392" y="271" text-anchor="start" font-size="10.5" fill="#555">gating</text>

  <!-- Phone Detection -->
  <rect x="220" y="278" width="320" height="58" rx="6" fill="#eef2fb" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="302" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Phone Detection</text>
  <text x="380" y="322" text-anchor="middle" font-size="11.5" fill="#3763b6">YOLOv11n (gated by pose)</text>

  <line x1="380" y1="336" x2="380" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Frame Classification + State Machine -->
  <rect x="220" y="360" width="320" height="58" rx="6" fill="#eef2fb" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="384" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Frame Classification + State Machine</text>
  <text x="380" y="404" text-anchor="middle" font-size="11.5" fill="#3763b6">8-frame smoothing, focused &#8596; warning</text>

  <line x1="380" y1="430" x2="380" y2="482" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="392" y="460" text-anchor="start" font-size="11" fill="#555">TCP / G-code</text>

  <!-- Raspberry Pi 5 -->
  <rect x="250" y="484" width="260" height="60" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="510" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Raspberry Pi 5</text>
  <text x="380" y="529" text-anchor="middle" font-size="11.5" fill="#555">TCP server + GPIO + Hardware PWM</text>

  <!-- split to steppers / servos -->
  <path d="M300,544 L160,596" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="566" text-anchor="middle" font-size="11" fill="#555">GPIO</text>
  <path d="M460,544 L600,596" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="558" y="566" text-anchor="middle" font-size="11" fill="#555">HW PWM</text>

  <!-- Arm Steppers -->
  <rect x="60" y="600" width="200" height="66" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="628" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Arm Steppers</text>
  <text x="160" y="648" text-anchor="middle" font-size="11" fill="#555">3 motors, Freenove A4988 drivers</text>

  <!-- Gimbal Servos -->
  <rect x="500" y="600" width="200" height="66" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="600" y="628" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Gimbal Servos</text>
  <text x="600" y="648" text-anchor="middle" font-size="11" fill="#555">2 &#215; SG92R (GPIO 18 / 19)</text>

  <!-- to Lamp Robot -->
  <path d="M160,666 L300,714" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M600,666 L460,714" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Lamp Robot -->
  <rect x="250" y="716" width="260" height="60" rx="6" fill="#fbeee9" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="742" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">Lamp Robot</text>
  <text x="380" y="761" text-anchor="middle" font-size="11.5" fill="#555">Freenove arm + 3D-printed head</text>

  <!-- feedback loop: Lamp Robot -> User (non-verbal cue) -->
  <path d="M510,746 L720,746 L720,43 L452,43" fill="none" stroke="#3763b6" stroke-width="1.5" stroke-dasharray="6 5" marker-end="url(#arrowBlue)"/>
  <text x="726" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#3763b6" transform="rotate(90 726 400)">non-verbal cue</text>
</svg>
